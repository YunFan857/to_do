<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的待办</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --bg-1:#f6f7fb;--bg-2:#eef1fb;
  --card:#ffffff;--card-2:#fafbfd;
  --text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:#e6e8ef;--border-strong:#cdd2dd;
  --primary:#4f46e5;--primary-hover:#4338ca;--primary-soft:#eef2ff;
  --once:#4f46e5;--once-soft:#eef2ff;
  --daily:#10b981;--daily-soft:#ecfdf5;
  --weekly:#8b5cf6;--weekly-soft:#f5f3ff;
  --monthly:#f59e0b;--monthly-soft:#fffbeb;
  --danger:#ef4444;--danger-soft:#fef2f2;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.05);
  --shadow:0 2px 6px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.05);
  --shadow-lg:0 8px 24px rgba(15,23,42,.12),0 24px 48px rgba(15,23,42,.10);
  --t:200ms cubic-bezier(.4,0,.2,1);
}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.55;color:var(--text-1);background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%) fixed;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:0;background:0 0;color:inherit;padding:0}
input,textarea,select{font:inherit;color:inherit}
.app{max-width:1200px;margin:0 auto;padding:36px 24px 80px}

/* Topbar */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.brand h1{margin:0;font-size:30px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.brand .date{margin:6px 0 0;color:var(--text-2);font-size:13px;display:flex;align-items:center;gap:8px}
.brand .date .dot{width:4px;height:4px;border-radius:50%;background:var(--text-3)}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;transition:all var(--t);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid transparent}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 2px rgba(79,70,229,.3)}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-ghost{background:var(--card);color:var(--text-2);border-color:var(--border)}
.btn-ghost:hover{background:var(--card-2);color:var(--text-1);border-color:var(--border-strong)}

/* Overview */
.overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:14px;transition:all var(--t);border:1px solid transparent}
.stat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.once{background:var(--once-soft)}.stat-icon.daily{background:var(--daily-soft)}.stat-icon.weekly{background:var(--weekly-soft)}.stat-icon.monthly{background:var(--monthly-soft)}
.stat-text{display:flex;flex-direction:column;min-width:0}
.stat-label{font-size:12px;color:var(--text-2);font-weight:500}
.stat-value{font-size:22px;font-weight:600;color:var(--text-1);line-height:1.2;margin-top:2px}
.stat-value .sub{color:var(--text-3);font-size:13px;font-weight:400;margin-left:2px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media (max-width:760px){.grid{grid-template-columns:1fr}}
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;overflow:hidden;min-height:220px;border:1px solid var(--border)}
.panel-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border)}
.panel-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.panel-title .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.panel-title .icon.once{background:var(--once-soft)}.panel-title .icon.daily{background:var(--daily-soft)}.panel-title .icon.weekly{background:var(--weekly-soft)}.panel-title .icon.monthly{background:var(--monthly-soft)}
.panel-count{font-size:11px;font-weight:600;color:var(--text-2);padding:3px 8px;background:var(--card-2);border-radius:999px;border:1px solid var(--border)}
.panel-actions{display:flex;gap:4px}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all var(--t);font-size:15px}
.icon-btn:hover{background:var(--card-2);color:var(--text-1)}
.icon-btn.danger:hover{background:var(--danger-soft);color:var(--danger)}

/* Cards */
.cards{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1;max-height:480px;overflow-y:auto}
.cards::-webkit-scrollbar{width:6px}
.cards::-webkit-scrollbar-track{background:transparent}
.cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cards::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;display:flex;align-items:flex-start;gap:11px;transition:all var(--t);position:relative;animation:slideIn 220ms ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm);background:var(--card-2)}
.card.completed{opacity:.55;background:var(--card-2)}
.card.completed .card-title{text-decoration:line-through;color:var(--text-3)}
.card-check{width:20px;height:20px;border-radius:7px;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all var(--t);cursor:pointer;background:var(--card)}
.card-check:hover{border-color:var(--primary);background:var(--primary-soft)}
.card.completed .card-check{background:var(--primary);border-color:var(--primary)}
.card.completed .card-check::after{content:'✓';color:#fff;font-size:12px;font-weight:700;line-height:1}
.card-body{flex:1;min-width:0;cursor:pointer;padding:1px 0}
.card-title{font-size:14px;font-weight:500;color:var(--text-1);word-break:break-word;line-height:1.4}
.card-desc{font-size:12px;color:var(--text-2);margin-top:3px;word-break:break-word;line-height:1.5}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.badge{padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
.badge.once{background:var(--once-soft);color:var(--once)}
.badge.daily{background:var(--daily-soft);color:var(--daily)}
.badge.weekly{background:var(--weekly-soft);color:var(--weekly)}
.badge.monthly{background:var(--monthly-soft);color:var(--monthly)}
.badge.overdue{background:var(--danger-soft);color:var(--danger)}
.badge.streak{background:#fff7ed;color:#ea580c}
.card-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--t);flex-shrink:0}
.card:hover .card-actions,.card:focus-within .card-actions{opacity:1}
.card-actions .icon-btn{width:26px;height:26px;font-size:13px}

.empty{padding:36px 20px;text-align:center;color:var(--text-3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:6px}
.empty-emoji{font-size:30px;opacity:.6}
.empty-tip{font-size:11px;color:var(--text-3);opacity:.7}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn 180ms ease-out}
.modal.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:var(--card);border-radius:var(--radius);width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:scaleIn 200ms ease-out;max-height:90vh;display:flex;flex-direction:column}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-header h2{margin:0;font-size:17px;font-weight:600}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;align-items:center}

.form-group{margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:500;color:var(--text-2)}
.form-group label .hint{color:var(--text-3);font-weight:400;margin-left:4px}
.form-group label .req{color:var(--danger);margin-left:2px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;color:var(--text-1);background:var(--card);transition:all var(--t)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.form-group textarea{resize:vertical;min-height:64px;font-family:inherit}
.form-group.hidden{display:none}

.type-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;background:var(--card-2);border-radius:10px;border:1px solid var(--border)}
.type-selector input{display:none}
.type-selector label{margin:0;padding:8px 4px;text-align:center;font-size:12px;border-radius:7px;cursor:pointer;transition:all var(--t);color:var(--text-2);font-weight:500}
.type-selector label:hover{color:var(--text-1)}
.type-selector input:checked+label{background:var(--card);color:var(--text-1);box-shadow:var(--shadow-sm);font-weight:600}

.btn-danger{color:var(--danger);background:0 0;margin-right:auto;border-color:transparent}
.btn-danger:hover{background:var(--danger-soft);border-color:var(--danger-soft)}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-1);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transition:all 280ms ease-out;pointer-events:none;z-index:200;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:480px){.app{padding:20px 14px 60px}.brand h1{font-size:24px}.stat-value{font-size:18px}.panel-header{padding:14px}.cards{padding:10px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <h1>📝 我的待办</h1>
      <p class="date" id="date"></p>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="new-btn">+ 新建待办</button>
      <button class="btn btn-ghost" id="export-btn" title="导出数据备份">⤓ 导出</button>
      <button class="btn btn-ghost" id="import-btn" title="导入数据备份">⤒ 导入</button>
    </div>
  </div>

  <div class="overview" id="overview"></div>

  <div class="grid">
    <section class="panel" data-type="once">
      <header class="panel-header">
        <div class="panel-title">
          <span class="icon once">📌</span>
          一次性待办
          <span class="panel-count" id="count-once"></span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn add-btn" data-type="once" title="添加一次性待办" aria-label="添加">+</button>
        </div>
      </header>
      <div class="cards" id="cards-once"></div>
    </section>

    <section class="panel" data-type="daily">
      <header class="panel-header">
        <div class="panel-title">
          <span class="icon daily">☀️</span>
          每日待办
          <span class="panel-count" id="count-daily"></span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn add-btn" data-type="daily" title="添加每日待办" aria-label="添加">+</button>
        </div>
      </header>
      <div class="cards" id="cards-daily"></div>
    </section>

    <section class="panel" data-type="weekly">
      <header class="panel-header">
        <div class="panel-title">
          <span class="icon weekly">📅</span>
          每周待办
          <span class="panel-count" id="count-weekly"></span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn add-btn" data-type="weekly" title="添加每周待办" aria-label="添加">+</button>
        </div>
      </header>
      <div class="cards" id="cards-weekly"></div>
    </section>

    <section class="panel" data-type="monthly">
      <header class="panel-header">
        <div class="panel-title">
          <span class="icon monthly">🗓️</span>
          每月待办
          <span class="panel-count" id="count-monthly"></span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn add-btn" data-type="monthly" title="添加每月待办" aria-label="添加">+</button>
        </div>
      </header>
      <div class="cards" id="cards-monthly"></div>
    </section>
  </div>
</div>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">新建待办</h2>
      <button class="icon-btn" id="modal-close" aria-label="关闭">✕</button>
    </div>
    <form id="todo-form" autocomplete="off">
      <div class="modal-body">
        <div class="form-group">
          <label>类型</label>
          <div class="type-selector">
            <input type="radio" name="type" id="t-once" value="once" checked>
            <label for="t-once">📌 一次性</label>
            <input type="radio" name="type" id="t-daily" value="daily">
            <label for="t-daily">☀️ 每日</label>
            <input type="radio" name="type" id="t-weekly" value="weekly">
            <label for="t-weekly">📅 每周</label>
            <input type="radio" name="type" id="t-monthly" value="monthly">
            <label for="t-monthly">🗓️ 每月</label>
          </div>
        </div>

        <div class="form-group">
          <label for="f-title">标题<span class="req">*</span></label>
          <input type="text" id="f-title" name="title" required maxlength="80" placeholder="要做的事情…">
        </div>

        <div class="form-group">
          <label for="f-desc">描述<span class="hint">(可选)</span></label>
          <textarea id="f-desc" name="description" maxlength="300" placeholder="补充一些细节…"></textarea>
        </div>

        <div class="form-group" data-type="once">
          <label for="f-due">截止日期<span class="hint">(可选)</span></label>
          <input type="date" id="f-due" name="dueDate">
        </div>

        <div class="form-group hidden" data-type="weekly">
          <label for="f-weekday">星期几</label>
          <select id="f-weekday" name="weekDay">
            <option value="1">周一</option>
            <option value="2">周二</option>
            <option value="3">周三</option>
            <option value="4">周四</option>
            <option value="5">周五</option>
            <option value="6">周六</option>
            <option value="0">周日</option>
          </select>
        </div>

        <div class="form-group hidden" data-type="monthly">
          <label for="f-monthday">每月几号<span class="hint">(1-31)</span></label>
          <input type="number" id="f-monthday" name="monthDay" min="1" max="31" value="1">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger hidden" id="delete-btn">删除</button>
        <button type="button" class="btn btn-ghost" id="cancel-btn">取消</button>
        <button type="submit" class="btn btn-primary" id="save-btn">保存</button>
      </div>
    </form>
  </div>
</div>

<input type="file" id="import-file" accept="application/json,.json" hidden>
<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  const KEY = 'todo-app-v1';
  let state = { todos: [] };
  let editingId = null;

  // ====== Persistence ======
  function load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.todos)) state = parsed;
      }
    }catch(e){console.warn('load failed',e)}
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }
    catch(e){ showToast('保存失败：' + e.message); }
  }

  // ====== Time helpers ======
  function pad(n){return n<10?'0'+n:n}
  function today(){
    const d = new Date();
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function isoWeek(d){
    const t = new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const dayNr = (t.getDay()+6)%7;
    t.setDate(t.getDate()-dayNr+3);
    const firstThu = t.valueOf();
    t.setMonth(0,1);
    if(t.getDay()!==4) t.setMonth(0,1+((4-t.getDay())+7)%7);
    const w = 1+Math.ceil((firstThu-t)/604800000);
    return d.getFullYear()+'-W'+pad(w);
  }
  function currentMonth(){
    const d = new Date();
    return d.getFullYear()+'-'+pad(d.getMonth()+1);
  }
  function periodKey(t){
    if(t==='daily') return today();
    if(t==='weekly') return isoWeek(new Date());
    if(t==='monthly') return currentMonth();
    return null;
  }
  function isDone(todo){
    if(todo.type==='once') return !!todo.completed;
    const k = periodKey(todo.type);
    return !!(k && todo.completions && todo.completions[k]);
  }
  const WD = ['周日','周一','周二','周三','周四','周五','周六'];
  function wdName(n){return WD[((Number(n)%7)+7)%7]}

  function friendlyDate(s){
    if(!s) return '';
    const d = new Date(s+'T00:00:00');
    if(isNaN(d)) return s;
    const td = new Date(today()+'T00:00:00');
    const diff = Math.round((d-td)/86400000);
    if(diff===0) return '今天';
    if(diff===1) return '明天';
    if(diff===-1) return '昨天';
    if(diff>0 && diff<=7) return diff+' 天后';
    if(diff<0 && diff>=-7) return (-diff)+' 天前';
    return (d.getMonth()+1)+'月'+d.getDate()+'日';
  }
  function isOverdue(todo){
    return todo.type==='once' && !todo.completed && todo.dueDate && todo.dueDate < today();
  }
  function dailyStreak(todo){
    if(todo.type!=='daily' || !todo.completions) return 0;
    let n = 0;
    const d = new Date();
    for(;;){
      const key = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      if(todo.completions[key]){ n++; d.setDate(d.getDate()-1); }
      else break;
    }
    return n;
  }

  // ====== Stats ======
  function stats(){
    const s = {once:{t:0,d:0},daily:{t:0,d:0},weekly:{t:0,d:0},monthly:{t:0,d:0}};
    for(const x of state.todos){
      s[x.type].t++;
      if(isDone(x)) s[x.type].d++;
    }
    return s;
  }
  const TYPE_META = {
    once:   {label:'一次性',     sub:'',           icon:'📌'},
    daily:  {label:'每日待办',   sub:'今日进度',   icon:'☀️'},
    weekly: {label:'每周待办',   sub:'本周进度',   icon:'📅'},
    monthly:{label:'每月待办',   sub:'本月进度',   icon:'🗓️'}
  };
  function renderOverview(){
    const s = stats();
    const d = new Date();
    const dateStr = (d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日')
                    + '<span class="dot"></span>'+wdName(d.getDay());
    document.getElementById('date').innerHTML = dateStr;
    const ov = document.getElementById('overview');
    ov.innerHTML = ['once','daily','weekly','monthly'].map(k=>{
      const m = TYPE_META[k], v = s[k];
      return '<div class="stat-card">'
        + '<div class="stat-icon '+k+'">'+m.icon+'</div>'
        + '<div class="stat-text">'
        +   '<span class="stat-label">'+m.label+(m.sub?' · '+m.sub:'')+'</span>'
        +   '<span class="stat-value">'+v.d+'<span class="sub"> / '+v.t+'</span></span>'
        + '</div></div>';
    }).join('');
  }

  // ====== Render cards ======
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function metaHTML(todo){
    if(todo.type==='once'){
      if(!todo.dueDate) return '';
      const ov = isOverdue(todo);
      return '<div class="card-meta"><span class="badge '+(ov?'overdue':'once')+'">'+(ov?'⚠ 已过期':'📅 ')+friendlyDate(todo.dueDate)+'</span></div>';
    }
    if(todo.type==='weekly'){
      return '<div class="card-meta"><span class="badge weekly">🔁 每周'+wdName(todo.weekDay==null?1:todo.weekDay)+'</span></div>';
    }
    if(todo.type==='monthly'){
      return '<div class="card-meta"><span class="badge monthly">🗓️ 每月 '+(todo.monthDay||1)+' 日</span></div>';
    }
    if(todo.type==='daily'){
      const s = dailyStreak(todo);
      return '<div class="card-meta"><span class="badge daily">☀️ 每天</span>'+(s>=2?'<span class="badge streak">🔥 连续 '+s+' 天</span>':'')+'</div>';
    }
    return '';
  }
  function cardHTML(todo){
    const done = isDone(todo);
    return '<div class="card '+(done?'completed':'')+'" data-id="'+todo.id+'">'
      + '<div class="card-check" data-action="toggle" role="checkbox" aria-checked="'+done+'" tabindex="0"></div>'
      + '<div class="card-body" data-action="edit">'
      +   '<div class="card-title">'+esc(todo.title)+'</div>'
      +   (todo.description?'<div class="card-desc">'+esc(todo.description)+'</div>':'')
      +   metaHTML(todo)
      + '</div>'
      + '<div class="card-actions">'
      +   '<button class="icon-btn" data-action="edit" title="编辑" aria-label="编辑">✎</button>'
      +   '<button class="icon-btn danger" data-action="delete" title="删除" aria-label="删除">🗑</button>'
      + '</div></div>';
  }
  function sortTodos(a,b){
    const ad = isDone(a)?1:0, bd = isDone(b)?1:0;
    if(ad!==bd) return ad-bd;
    if(a.type==='once' && b.type==='once'){
      const ao = isOverdue(a)?0:1, bo = isOverdue(b)?0:1;
      if(ao!==bo) return ao-bo;
      if(a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if(a.dueDate) return -1;
      if(b.dueDate) return 1;
    }
    return (b.createdAt||'').localeCompare(a.createdAt||'');
  }
  const EMPTY = {
    once:   {e:'🌱', t:'还没有一次性待办', tip:'点右上 + 添加一个任务'},
    daily:  {e:'☀️', t:'还没有每日习惯', tip:'加一个好习惯，每天打卡'},
    weekly: {e:'📅', t:'还没有每周计划', tip:'安排一些周节奏的待办'},
    monthly:{e:'🗓️', t:'还没有每月待办', tip:'比如交房租、复盘…'}
  };
  function renderSection(type){
    const list = state.todos.filter(t=>t.type===type).sort(sortTodos);
    const box = document.getElementById('cards-'+type);
    const cnt = document.getElementById('count-'+type);
    const s = stats();
    cnt.textContent = s[type].d+' / '+s[type].t;
    if(list.length===0){
      const p = EMPTY[type];
      box.innerHTML = '<div class="empty"><div class="empty-emoji">'+p.e+'</div><div>'+p.t+'</div><div class="empty-tip">'+p.tip+'</div></div>';
    } else {
      box.innerHTML = list.map(cardHTML).join('');
    }
  }
  function render(){
    renderOverview();
    ['once','daily','weekly','monthly'].forEach(renderSection);
  }

  // ====== Actions ======
  function toggle(id){
    const t = state.todos.find(x=>x.id===id);
    if(!t) return;
    if(t.type==='once'){
      t.completed = !t.completed;
      t.completedAt = t.completed ? new Date().toISOString() : null;
    } else {
      t.completions = t.completions || {};
      const k = periodKey(t.type);
      t.completions[k] = !t.completions[k];
    }
    save(); render();
  }
  function del(id){
    state.todos = state.todos.filter(x=>x.id!==id);
    save(); render();
    showToast('已删除');
  }

  // ====== Modal ======
  function openModal(type, id){
    editingId = id || null;
    const modal = document.getElementById('modal');
    const form = document.getElementById('todo-form');
    const titleEl = document.getElementById('modal-title');
    const delBtn = document.getElementById('delete-btn');

    if(id){
      const t = state.todos.find(x=>x.id===id);
      if(!t) return;
      titleEl.textContent = '编辑待办';
      delBtn.classList.remove('hidden');
      form.querySelector('input[name="type"][value="'+t.type+'"]').checked = true;
      form.title.value = t.title || '';
      form.description.value = t.description || '';
      form.dueDate.value = t.dueDate || '';
      form.weekDay.value = (t.weekDay!=null?t.weekDay:1);
      form.monthDay.value = t.monthDay || 1;
    } else {
      titleEl.textContent = '新建待办';
      delBtn.classList.add('hidden');
      form.reset();
      form.querySelector('input[name="type"][value="'+type+'"]').checked = true;
      form.dueDate.value = today();
      form.weekDay.value = new Date().getDay();
      form.monthDay.value = new Date().getDate();
    }
    updateTypeFields();
    modal.classList.remove('hidden');
    setTimeout(()=>form.title.focus(),60);
  }
  function closeModal(){
    document.getElementById('modal').classList.add('hidden');
    editingId = null;
  }
  function currentType(){
    const el = document.querySelector('input[name="type"]:checked');
    return el ? el.value : 'once';
  }
  function updateTypeFields(){
    const t = currentType();
    document.querySelectorAll('.form-group[data-type]').forEach(g=>{
      g.classList.toggle('hidden', g.dataset.type !== t);
    });
  }
  function saveForm(e){
    e.preventDefault();
    const form = e.target;
    const title = form.title.value.trim();
    if(!title){ form.title.focus(); return; }
    const data = {
      type: currentType(),
      title: title,
      description: form.description.value.trim()
    };
    if(editingId){
      const t = state.todos.find(x=>x.id===editingId);
      if(!t) return;
      Object.assign(t, data);
      // clean & set per-type fields
      delete t.dueDate; delete t.weekDay; delete t.monthDay;
      if(t.type==='once') t.dueDate = form.dueDate.value || null;
      else if(t.type==='weekly') t.weekDay = Number(form.weekDay.value);
      else if(t.type==='monthly') t.monthDay = Math.max(1, Math.min(31, Number(form.monthDay.value)||1));
      showToast('已更新');
    } else {
      const t = {
        id: 't_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        createdAt: new Date().toISOString(),
        completions: {},
        ...data
      };
      if(t.type==='once') t.dueDate = form.dueDate.value || null;
      else if(t.type==='weekly') t.weekDay = Number(form.weekDay.value);
      else if(t.type==='monthly') t.monthDay = Math.max(1, Math.min(31, Number(form.monthDay.value)||1));
      state.todos.push(t);
      showToast('已添加');
    }
    save(); render(); closeModal();
  }

  // ====== Import / Export ======
  function exportData(){
    const blob = new Blob([JSON.stringify({version:1, exportedAt:new Date().toISOString(), todos:state.todos}, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'todo-backup-'+today()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    showToast('已导出备份');
  }
  function importData(file){
    const r = new FileReader();
    r.onload = e => {
      try{
        const data = JSON.parse(e.target.result);
        if(!data || !Array.isArray(data.todos)) throw new Error('文件格式不对');
        if(!confirm('导入将覆盖当前所有数据，确定继续？')) return;
        state = { todos: data.todos };
        save(); render();
        showToast('已导入，共 '+state.todos.length+' 条');
      }catch(err){ showToast('导入失败：'+err.message); }
    };
    r.readAsText(file);
  }

  // ====== Toast ======
  let toastT = null;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(()=>el.classList.remove('show'), 1800);
  }

  // ====== Events ======
  function bind(){
    document.getElementById('new-btn').addEventListener('click', ()=>openModal('once'));
    document.querySelectorAll('.add-btn').forEach(b=>{
      b.addEventListener('click', ()=>openModal(b.dataset.type));
    });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e=>{
      if(e.target.id==='modal') closeModal();
    });
    document.getElementById('todo-form').addEventListener('submit', saveForm);
    document.querySelectorAll('input[name="type"]').forEach(i=>{
      i.addEventListener('change', updateTypeFields);
    });
    document.getElementById('delete-btn').addEventListener('click', ()=>{
      if(editingId && confirm('确定删除这个待办？')){
        const id = editingId;
        closeModal();
        del(id);
      }
    });
    document.getElementById('export-btn').addEventListener('click', exportData);
    document.getElementById('import-btn').addEventListener('click', ()=>{
      document.getElementById('import-file').click();
    });
    document.getElementById('import-file').addEventListener('change', e=>{
      const f = e.target.files[0];
      if(f) importData(f);
      e.target.value = '';
    });

    // Card actions via delegation
    document.querySelectorAll('.cards').forEach(box=>{
      box.addEventListener('click', e=>{
        const card = e.target.closest('.card');
        if(!card) return;
        const id = card.dataset.id;
        const actionEl = e.target.closest('[data-action]');
        if(!actionEl) return;
        const action = actionEl.dataset.action;
        if(action==='toggle') toggle(id);
        else if(action==='edit') openModal(null, id);
        else if(action==='delete'){
          if(confirm('确定删除这个待办？')) del(id);
        }
      });
      // keyboard activation for checkbox
      box.addEventListener('keydown', e=>{
        if((e.key===' '||e.key==='Enter') && e.target.classList.contains('card-check')){
          e.preventDefault();
          const card = e.target.closest('.card');
          if(card) toggle(card.dataset.id);
        }
      });
    });

    // Global shortcuts
    document.addEventListener('keydown', e=>{
      const modalOpen = !document.getElementById('modal').classList.contains('hidden');
      if(e.key==='Escape' && modalOpen){ closeModal(); return; }
      const inField = e.target.matches('input,textarea,select');
      if(!inField && !modalOpen && (e.key==='n'||e.key==='N')){
        e.preventDefault(); openModal('once');
      }
    });
  }

  // ====== Init ======
  load(); bind(); render();

  // Re-render at midnight to roll daily status
  function scheduleMidnight(){
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 30);
    setTimeout(()=>{ render(); scheduleMidnight(); }, next - now);
  }
  scheduleMidnight();

  // Re-render when tab becomes visible (in case the day changed)
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden) render();
  });
})();
</script>
</body>
</html>
